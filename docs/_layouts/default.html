<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  {%- include head.html -%}
  <body>
    <main class="page-content" aria-label="Content">
      <div class="w">
        {{ content }}
        <div class="credits">
          {%- if site.theme_config.show_copyright == true -%}
          &copy;&nbsp;{{ "now" | date: "%Y" }}&nbsp;{{site.author}}
          &nbsp;
          •
          &nbsp;
          {%- endif -%}
        </div>
      </div>
    </main>
    
  </body>
</html>
